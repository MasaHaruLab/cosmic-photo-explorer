<style>

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 15px/1.6 -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }

  .ring-label:hover { color: var(--cyan); text-decoration: underline; }
  .ring-label.earth { color: #bfe4ff; font-weight: 600; }

  .helio-label { position: absolute; transform: translate(-50%, -50%); white-space: nowrap;

  .sun-label { position: absolute; transform: translate(-50%, 16px); white-space: nowrap;

  .sat-label { position: absolute; transform: translate(-50%, -160%); white-space: nowrap;

  /* Milestone markers — small always-on dot, tip expands on hover/tap */
  .msg-marker { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; z-index: 3; }
  .msg-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mc);
    box-shadow: 0 0 6px var(--mc); transition: box-shadow .25s ease; }

  .msg-tip { position: absolute; left: 13px; top: -10px; display: none; white-space: nowrap;

  .panel { position: absolute; top: 18px; left: 18px; width: min(370px, calc(100vw - 36px));

  .panel.collapsed { transform: translateX(calc(-100% - 30px)); opacity: 0; pointer-events: none; }

  .topnav .back, .topnav .lang-toggle { background: rgba(11,16,28,0.7);

  .probe-chip .chip-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mc); box-shadow: 0 0 6px var(--mc); }

  .mile-item:hover { background: rgba(157,184,255,0.06); }

  .mile-item b { display: block; color: var(--text); font-weight: 600; }

  /* Bottom controls: one independent transport row per probe (own scrubber,
     own play/pause, own date readout) — see Change 1 in HANDOFF/task notes. */
  .dock { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: stretch; gap: 8px; width: min(560px, calc(100vw - 36px)); }
  .transport { display: flex; align-items: center; gap: 10px;
    background: rgba(11,16,28,0.7); border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 16px 7px 12px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .transport .t-dot { flex: none; width: 9px; height: 9px; border-radius: 50%; background: var(--mc); box-shadow: 0 0 6px var(--mc); }
  .transport .t-name { flex: none; min-width: 62px; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .transport .t-range { flex: 1; min-width: 40px; accent-color: var(--mc); cursor: pointer; }
  .transport .t-play { flex: none; width: 32px; height: 28px; padding: 0; line-height: 1;

<script>
(function () {
  'use strict'

  const I18N = window.I18N
  const canvas = document.getElementById('sky')
  const labelLayer = document.getElementById('labels')

  // --- Radial scale compression: direction-preserving sqrt compression, applied
  //     identically to every spatial thing (trajectories, milestones, planet
  //     rings, heliopause). Keeps angular direction exact while compressing
  //     radius, so 1 AU Earth and 170+ AU Voyager 1 both fit on screen and the
  //     fan-out / flyby kinks stay faithful. Tuned visually: BASE = 6 keeps the
  //     four inner planets distinct while leaving headroom for the heliopause. ---
  const BASE = 6
  function compress(x, y, z) {
    const r = Math.hypot(x, y, z)
    if (r < 1e-6) return [0, 0, 0]
    const rp = BASE * Math.sqrt(r)
    const k = rp / r
    return [x * k, y * k, z * k]
  }
  const ringRadius = (au) => BASE * Math.sqrt(au)

  const PLANETS = [
    { key: 'mercury', au: 0.39 },
    { key: 'venus', au: 0.72 },
    { key: 'earth', au: 1.00, emphasize: true },
    { key: 'mars', au: 1.52 },
    { key: 'jupiter', au: 5.20 },
    { key: 'saturn', au: 9.58 },
    { key: 'uranus', au: 19.2 },
    { key: 'neptune', au: 30.1 },
  ]
  const HELIOPAUSE_AU = 120
  const HELIO_LABEL_ANGLE = (-62 * Math.PI) / 180  // lower-right, clear of ring labels

  const PROBE_COLORS = {
    'voyager-1': '#4fd8ff', 'voyager-2': '#9b7bff',
    'pioneer-10': '#ffb454', 'pioneer-11': '#ff6f91', 'new-horizons': '#66d99a',
  }
  const PROBE_GLOW = {
    'voyager-1': ['rgba(79,216,255,0.55)', 'rgba(79,216,255,0)'],
    'voyager-2': ['rgba(155,123,255,0.55)', 'rgba(155,123,255,0)'],
    'pioneer-10': ['rgba(255,180,84,0.55)', 'rgba(255,180,84,0)'],
    'pioneer-11': ['rgba(255,111,145,0.55)', 'rgba(255,111,145,0)'],
    'new-horizons': ['rgba(102,217,154,0.55)', 'rgba(102,217,154,0)'],
  }
  // Each probe now plays on its own independent transport (own progress, own
  // play state) instead of a single shared clock — see the per-probe dock
  // below. Traverse duration is independently tunable per probe; V2 runs
  // slightly longer than V1 because its compressed path has ~15% more total
  // arc length (it visits two extra planets), so equal seconds would make it
  // visibly outrun V1 on screen — this keeps their on-screen speeds matched.
  // Traverse duration per probe (seconds), independently tunable. Because playback
  // is arc-length paced, longer/twistier paths need more seconds to keep on-screen
  // speed matched across probes; missing ids fall back to 40 (see `|| 40` below).
  const PROBE_SECONDS = {
    'voyager-1': 40, 'voyager-2': 46,
    'pioneer-10': 40, 'pioneer-11': 40, 'new-horizons': 30,
  }

  const load = (src) => new Promise((res, rej) => {
    const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej
    document.head.appendChild(s)
  })
  Promise.all([
    load('vendor/three.min.js').then(() => load('vendor/OrbitControls.js')),
    fetch('data/probe_vectors.json').then((r) => r.json()),
    fetch('data/planets.json').then((r) => r.json()),
  ]).then(([, probesData, planetsData]) => start(probesData, planetsData)).catch((err) => {
    console.error(err)
    const el = document.querySelector('[data-dock]')
    if (el) el.textContent = I18N.t('msg.loadError')
  })

  function pick(zh, en) { return I18N.getLang() === 'zh' ? zh : en }

  // Emoji satellite marker on a soft colored glow, drawn once per probe.
  function satelliteTexture(THREE, glowInner, glowOuter) {
    const c = document.createElement('canvas'); c.width = c.height = 128
    const g = c.getContext('2d')
    const grd = g.createRadialGradient(64, 64, 4, 64, 64, 62)
    grd.addColorStop(0, glowInner); grd.addColorStop(1, glowOuter)
    g.fillStyle = grd; g.fillRect(0, 0, 128, 128)
    g.font = '62px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif'
    g.textAlign = 'center'; g.textBaseline = 'middle'
    g.fillText('🛰', 64, 70)
    return new THREE.CanvasTexture(c)
  }

  // Small soft-glow dot marking a planet's REAL heliocentric position on its
  // ring (Change 2) — same radial-gradient-on-canvas idiom as sunTexture /
  // satelliteTexture, just a plain colored disc instead of an emoji or corona.
  function planetDotTexture(THREE, colorHex) {
    const c = document.createElement('canvas'); c.width = c.height = 64
    const g = c.getContext('2d')
    const grd = g.createRadialGradient(32, 32, 0, 32, 32, 30)
    grd.addColorStop(0, colorHex)
    grd.addColorStop(0.5, colorHex)
    grd.addColorStop(1, 'rgba(0,0,0,0)')
    g.fillStyle = grd; g.fillRect(0, 0, 64, 64)
    return new THREE.CanvasTexture(c)
  }

  function sunTexture(THREE) {
    const c = document.createElement('canvas'); c.width = c.height = 128
    const g = c.getContext('2d')
    const grd = g.createRadialGradient(64, 64, 0, 64, 64, 64)
    grd.addColorStop(0.0, 'rgba(255,246,220,1)')
    grd.addColorStop(0.25, 'rgba(255,214,140,0.9)')
    grd.addColorStop(0.6, 'rgba(255,170,90,0.28)')
    grd.addColorStop(1.0, 'rgba(255,170,90,0)')
    g.fillStyle = grd; g.fillRect(0, 0, 128, 128)
    return new THREE.CanvasTexture(c)
  }

  function ringPositions(radius, segments) {
    const arr = new Float32Array(segments * 3)
    for (let i = 0; i < segments; i++) {
      const a = (i / segments) * Math.PI * 2
      arr[i * 3] = radius * Math.cos(a)
      arr[i * 3 + 1] = radius * Math.sin(a)
      arr[i * 3 + 2] = 0
    }
    return arr
  }
  // Closed (first point repeated) so LineDashedMaterial's cumulative distances
  // wrap the full loop cleanly instead of leaving a seam at the closing edge.
  function closedRingPositions(radius, segments) {
    const arr = new Float32Array((segments + 1) * 3)
    for (let i = 0; i <= segments; i++) {
      const a = (i / segments) * Math.PI * 2
      arr[i * 3] = radius * Math.cos(a)
      arr[i * 3 + 1] = radius * Math.sin(a)
      arr[i * 3 + 2] = 0
    }
    return arr
  }

  // Continuous sample-index (e.g. 109.4, between samples 109 and 110) ->
  // arc-length fraction 0..1, by linearly interpolating the cumulative-arc
  // table. Used once per milestone to precompute where it falls in arc space.
  function arcFractionAtIndex(cumArc, totalArc, contIdx) {
    const n = cumArc.length
    const i = Math.max(0, Math.min(n - 1, Math.floor(contIdx)))
    const f = contIdx - i
    const a = cumArc[i]
    const b = cumArc[Math.min(i + 1, n - 1)]
    return (a + (b - a) * f) / totalArc
  }

  // Inverse: arc-length fraction 0..1 -> continuous sample-index. Binary
  // search for the bracketing samples, then interpolate within that segment.
  function indexAtArcFraction(probe, s) {
    const cumArc = probe.cumArc
    const target = Math.max(0, Math.min(1, s)) * probe.totalArc
    let lo = 0, hi = cumArc.length - 1
    while (lo < hi) {
      const mid = (lo + hi) >> 1
      if (cumArc[mid] < target) lo = mid + 1
      else hi = mid
    }
    if (lo === 0) return 0
    const prev = cumArc[lo - 1]
    const span = cumArc[lo] - prev || 1
    return (lo - 1) + Math.min(1, Math.max(0, (target - prev) / span))
  }

  function start(probesData, planetsData) {
    const THREE = window.THREE
    // Real planet data — id -> real heliocentric position [x,y,z] AU (the dot)
    // and the real orbit as an inclined 3D polyline (the ring). Same ecliptic
    // frame/units as the probe paths. The orbits are genuinely non-coplanar:
    // each is tilted by its true inclination (Mercury ~7°, the rest ~1–3°), so
    // the planets form a thin tilted pancake, not a fake flat disc.
    const planetPosByKey = {}
    const planetOrbitByKey = {}
    const planetInclByKey = {}
    ;(planetsData.planets || []).forEach((pl) => {
      planetPosByKey[pl.id] = pl.pos
      planetOrbitByKey[pl.id] = pl.orbit
      planetInclByKey[pl.id] = pl.incl_deg
    })
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5))
    renderer.outputEncoding = THREE.sRGBEncoding
    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 4000)

    // --- Background starfield ---
    const bgGeo = new THREE.BufferGeometry()
    const bgN = 900, bgArr = new Float32Array(bgN * 3)
    for (let i = 0; i < bgN; i++) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(Math.random() * 2 - 1), r = 1600
      bgArr[i * 3] = r * Math.sin(ph) * Math.cos(th)
      bgArr[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th)
      bgArr[i * 3 + 2] = r * Math.cos(ph)
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgArr, 3))
    scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x9fb0d0, size: 2.4, sizeAttenuation: false, transparent: true, opacity: 0.55 })))

    // --- Sun ---
    const sunCore = new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 24, 18),
      new THREE.MeshBasicMaterial({ color: 0xfff2c8 }),
    )
    scene.add(sunCore)
    const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: sunTexture(THREE), transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }))
    sunGlow.scale.set(9, 9, 1)
    scene.add(sunGlow)
    const sunLabel = document.createElement('div'); sunLabel.className = 'sun-label'
    labelLayer.appendChild(sunLabel)

    // --- Planet orbits drawn as their REAL inclined 3D ellipses + a dot at each
    //     planet's REAL current position on that orbit. The orbit polyline comes
    //     from planets.json (true a/e/i/Ω/ω), so the orbits are tilted relative
    //     to each other — the planets are NOT coplanar, matching reality. Falls
    //     back to a flat circle only if a planet's orbit is ever missing. ---
    const planetRings = []
    PLANETS.forEach((p) => {
      const radius = ringRadius(p.au)
      const orbitAU = planetOrbitByKey[p.key]
      const geo = new THREE.BufferGeometry()
      if (orbitAU && orbitAU.length) {
        const arr = new Float32Array(orbitAU.length * 3)
        for (let i = 0; i < orbitAU.length; i++) {
          const c = compress(orbitAU[i][0], orbitAU[i][1], orbitAU[i][2])
          arr[i * 3] = c[0]; arr[i * 3 + 1] = c[1]; arr[i * 3 + 2] = c[2]
        }
        geo.setAttribute('position', new THREE.BufferAttribute(arr, 3))
      } else {
        geo.setAttribute('position', new THREE.BufferAttribute(ringPositions(radius, 128), 3))
      }
      const mat = new THREE.LineBasicMaterial({
        color: p.emphasize ? 0x8fd6ff : 0x6f84ac,
        transparent: true, opacity: p.emphasize ? 0.65 : 0.32,
      })
      const ring = new THREE.LineLoop(geo, mat)
      scene.add(ring)

      const realPos = planetPosByKey[p.key]
      const [dx, dy, dz] = realPos
        ? compress(realPos[0], realPos[1], realPos[2])
        : [radius, 0, 0] // defensive fallback if a planet is ever missing from planets.json
      const dotVec = new THREE.Vector3(dx, dy, dz)
      const dot = new THREE.Sprite(new THREE.SpriteMaterial({
        map: planetDotTexture(THREE, p.emphasize ? '#bfe4ff' : '#9fb0d0'),
        transparent: true, depthTest: false, depthWrite: false,
      }))
      const dotScale = p.emphasize ? 1.1 : 0.75
      dot.scale.set(dotScale, dotScale, 1)
      dot.position.copy(dotVec)
      dot.renderOrder = 5
      scene.add(dot)

      const labelEl = document.createElement('div')
      labelEl.className = 'ring-label' + (p.emphasize ? ' earth' : '')
      labelEl.style.cursor = 'pointer'
      labelEl.title = '在太阳系里看它 →'
      labelEl.addEventListener('click', () => { window.location.href = 'solar.html#body-' + p.key })
      labelLayer.appendChild(labelEl)
      planetRings.push({ planet: p, radius, labelEl, dotVec })
    })

    // --- Heliopause: dashed ecliptic ring + faint wireframe sphere. Both share
    //     the same compressed radius, so a probe's interstellar-entry milestone
    //     (r ≈ 120 AU) lands right on the sphere — the alignment is the payoff. ---
    const helioRadius = ringRadius(HELIOPAUSE_AU)
    const helioGeo = new THREE.BufferGeometry()
    helioGeo.setAttribute('position', new THREE.BufferAttribute(closedRingPositions(helioRadius, 160), 3))
    const helioLine = new THREE.Line(helioGeo, new THREE.LineDashedMaterial({
      color: 0x9fb0d0, transparent: true, opacity: 0.5, dashSize: helioRadius * 0.02, gapSize: helioRadius * 0.014,
    }))
    helioLine.computeLineDistances()
    scene.add(helioLine)
    const helioSphere = new THREE.Mesh(
      new THREE.SphereGeometry(helioRadius, 20, 10),
      new THREE.MeshBasicMaterial({ color: 0x6f84ac, wireframe: true, transparent: true, opacity: 0.08 }),
    )
    // SphereGeometry's poles default to the local Y axis; rotate them onto Z so
    // the wireframe's "latitude" rings lie flat in the ecliptic (reading as clean
    // concentric circles from the top-down default view) and its "longitude"
    // lines run pole-to-pole along ecliptic north/south — matching the page's
    // north/south narrative instead of an arbitrary crisscross lattice.
    helioSphere.rotation.x = Math.PI / 2
    scene.add(helioSphere)
    const helioLabel = document.createElement('div'); helioLabel.className = 'helio-label'
    labelLayer.appendChild(helioLabel)

    // --- Per-probe trajectories, satellites, milestones ---
    const probes = probesData.map((p) => {
      const colorHex = PROBE_COLORS[p.id] || '#9db8ff'
      const color = new THREE.Color(colorHex)
      const compressedPath = p.path.map(([x, y, z]) => {
        const [cx, cy, cz] = compress(x, y, z)
        return new THREE.Vector3(cx, cy, cz)
      })

      // Cumulative on-screen (compressed) arc length along the path. Playback
      // advances linearly in THIS, not in time index — the inner planetary
      // tour is spatially twisty (lots of arc length per sample) while the
      // late interstellar cruise is a near-straight, slowly-lengthening line
      // (little arc length per sample), so a constant-time clock made the
      // cruise crawl. Constant arc-length speed fixes that: see
      // indexAtArcFraction() / applyProbeArc() below.
      const cumArc = new Float64Array(compressedPath.length)
      for (let i = 1; i < compressedPath.length; i++) {
        cumArc[i] = cumArc[i - 1] + compressedPath[i - 1].distanceTo(compressedPath[i])
      }
      const totalArc = cumArc[cumArc.length - 1] || 1

      // Glowing "tube" trajectory: a real Catmull-Rom curve threaded through
      // every true sample (5-day resolution), so flyby bends stay faithful —
      // only the tube's polygon budget (tubularSegments) is capped for perf.
      const curve = new THREE.CatmullRomCurve3(compressedPath, false, 'catmullrom', 0.5)
      const tubularSegments = Math.min(900, compressedPath.length)
      const core = new THREE.Mesh(
        new THREE.TubeGeometry(curve, tubularSegments, 0.32, 6, false),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 }),
      )
      const glow = new THREE.Mesh(
        new THREE.TubeGeometry(curve, tubularSegments, 1.15, 8, false),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.16, blending: THREE.AdditiveBlending, depthWrite: false }),
      )
      const group = new THREE.Group()
      group.add(glow); group.add(core)
      scene.add(group)

      // Satellite rider — the animation this page exists to preserve.
      const sat = new THREE.Sprite(new THREE.SpriteMaterial({
        map: satelliteTexture(THREE, PROBE_GLOW[p.id][0], PROBE_GLOW[p.id][1]),
        transparent: true, depthTest: false, depthWrite: false,
      }))
      sat.scale.set(3.4, 3.4, 1)
      sat.renderOrder = 10
      scene.add(sat)
      const satLabel = document.createElement('div')
      satLabel.className = 'sat-label'
      satLabel.style.color = colorHex
      labelLayer.appendChild(satLabel)

      // Milestone markers (HTML overlay, hover/click expands the tip). Each
      // milestone's arrival is stored in arc-length terms (arcFrac) so
      // "passed" can be compared directly against the arc-paced playback
      // progress below.
      const milestones = p.milestones.map((m) => {
        const [mx, my, mz] = compress(m.pos[0], m.pos[1], m.pos[2])
        const posVec = new THREE.Vector3(mx, my, mz)
        const arcFrac = arcFractionAtIndex(cumArc, totalArc, m.t * (p.samples - 1))
        const el = document.createElement('div')
        el.className = 'msg-marker'
        el.style.setProperty('--mc', colorHex)
        el.innerHTML = '<div class="msg-dot"></div><div class="msg-tip"><b></b><span class="meta"></span></div>'
        el.addEventListener('click', (e) => { e.stopPropagation(); el.classList.toggle('pinned') })
        labelLayer.appendChild(el)
        return { m, posVec, el, tipB: el.querySelector('b'), tipMeta: el.querySelector('.meta'), everPassed: false, arcFrac }
      })

      return {
        id: p.id, label: p.label, labelEn: p.label_en, start: p.start, samples: p.samples,
        stepDays: p.step_days, distAu: p.dist_au, colorHex, compressedPath, group, sat, satLabel, milestones,
        visible: true, cumArc, totalArc, seconds: PROBE_SECONDS[p.id] || 40,
        // Independent per-probe transport state (Change 1): own progress (s,
        // an arc-length fraction 0..1) and own play flag. Default s = 1 keeps
        // the existing "today" default the satellite used to open on.
        s: 1, playing: false, dock: null,
      }
    })

    // Combined, chronologically sorted milestone list for the panel.
    const allMilestones = []
    probes.forEach((probe) => probe.milestones.forEach((entry) => allMilestones.push({ probe, entry })))
    allMilestones.sort((a, b) => a.entry.m.date.localeCompare(b.entry.m.date))

    // --- Camera + controls: a tilted 3/4 view over the ecliptic (+Z up). The
    //     default is deliberately NOT straight-down so you immediately see the
    //     real 3D structure — the planets lie on a flat disc (the solar system
    //     really is that flat, all within ~7° of the ecliptic) while the probes
    //     escape it: Voyager 1 climbs north, Voyager 2 dives south. Drag to spin
    //     to a top-down or edge-on view. camera.up MUST be set before constructing
    //     OrbitControls — it bakes the pole axis into its internal quaternion at
    //     construction time and won't pick up a later change. ---
    camera.up.set(0, 0, 1)
    let maxTip = helioRadius
    probes.forEach((p) => { maxTip = Math.max(maxTip, p.compressedPath[p.compressedPath.length - 1].length()) })
    const initialDistance = (maxTip / Math.tan((22 * Math.PI) / 180)) * 1.28
    // ~40° off the pole: enough tilt to read the planet disc AND the probes'
    // north/south break-out, without foreshortening the in-plane fan too hard.
    camera.position.set(initialDistance * 0.166, -initialDistance * 0.621, initialDistance * 0.766)
    const controls = new THREE.OrbitControls(camera, renderer.domElement)
    controls.target.set(0, 0, 0)
    controls.enableDamping = true
    controls.dampingFactor = 0.08
    controls.rotateSpeed = 0.5
    controls.enablePan = false
    controls.minDistance = 3
    controls.maxDistance = initialDistance * 3.2
    controls.update()

    // --- Per-probe transport state ---
    function dateAtIndex(probe, idx) {
      const d = new Date(probe.start + 'T00:00:00Z')
      d.setUTCDate(d.getUTCDate() + idx * probe.stepDays)
      return d.toISOString().slice(0, 10)
    }

    // Advance/scrub probe by arc-length fraction s (0..1): interpolate the
    // satellite's on-screen position between the two bracketing samples, then
    // round to the nearest sample for the date readout and milestone
    // triggering — this is the "arc-length -> interpolate -> nearest index"
    // pipeline the task calls for, decoupled per probe.
    function applyProbeArc(probe, s) {
      probe.s = Math.min(1, Math.max(0, s))
      const contIdx = indexAtArcFraction(probe, probe.s)
      const i = Math.floor(contIdx)
      const f = contIdx - i
      const a = probe.compressedPath[i]
      const b = probe.compressedPath[Math.min(i + 1, probe.compressedPath.length - 1)]
      probe.sat.position.lerpVectors(a, b, f)

      probe.milestones.forEach((entry) => {
        const passed = probe.s >= entry.arcFrac
        const wasPassed = entry.everPassed
        entry.el.classList.toggle('passed', passed)
        if (passed && !wasPassed) {
          entry.el.classList.add('pulse')
          requestAnimationFrame(() => setTimeout(() => entry.el.classList.remove('pulse'), 1000))
        }
        entry.everPassed = passed
      })

      const nearestIdx = Math.round(contIdx)
      const dateStr = dateAtIndex(probe, nearestIdx)
      if (probe.dock) {
        probe.dock.yearEl.textContent = dateStr.slice(0, 4)
        probe.dock.fullEl.textContent = dateStr
        probe.dock.rangeEl.value = String(Math.round(probe.s * 1000))
      }
    }

    function setPlayBtnState(probe) {
      const btn = probe.dock.playBtn
      btn.textContent = probe.playing ? '⏸' : '▶'
      btn.classList.toggle('playing', probe.playing)
      btn.setAttribute('aria-label', I18N.t(probe.playing ? 'msg.pause' : 'msg.play'))
    }
    function stopProbePlay(probe) {
      if (!probe.playing) return
      probe.playing = false
      setPlayBtnState(probe)
    }
    function toggleProbePlay(probe) {
      if (probe.playing) { stopProbePlay(probe); return }
      if (probe.s >= 0.999) applyProbeArc(probe, 0) // ▶ from the end restarts from 0
      probe.playing = true
      setPlayBtnState(probe)
    }

    // --- Per-probe transport dock: one compact row per probe (dot + name +
    //     scrubber + play/pause + date), fully independent of one another. ---
    const dockEl = document.querySelector('[data-dock]')
    function buildDock() {
      dockEl.innerHTML = ''
      probes.forEach((probe) => {
        const row = document.createElement('div')
        row.className = 'transport'
        row.style.setProperty('--mc', probe.colorHex)
        row.innerHTML =
          '<span class="t-dot"></span>' +
          '<span class="t-name"></span>' +
          '<input type="range" class="t-range" min="0" max="1000" value="0">' +
          '<button type="button" class="t-play">▶</button>' +
          '<span class="t-date"><span class="t-year"></span><span class="t-full"></span></span>'
        row.querySelector('.t-name').textContent = pick(probe.label, probe.labelEn)
        const rangeEl = row.querySelector('.t-range')
        const playBtn = row.querySelector('.t-play')
        const yearEl = row.querySelector('.t-year')
        const fullEl = row.querySelector('.t-full')
        rangeEl.setAttribute('aria-label', I18N.t('msg.timelineLabel', { name: pick(probe.label, probe.labelEn) }))

        probe.dock = { rangeEl, playBtn, yearEl, fullEl }

        rangeEl.addEventListener('input', () => {
          stopProbePlay(probe) // dragging a probe's scrubber pauses only that probe
          applyProbeArc(probe, Number(rangeEl.value) / 1000)
        })
        playBtn.addEventListener('click', () => toggleProbePlay(probe))

        dockEl.appendChild(row)
        setPlayBtnState(probe)
        applyProbeArc(probe, probe.s) // sync the fresh DOM to current progress
      })
    }

    // --- Probe visibility chips ---
    const pickerEl = document.querySelector('[data-probe-picker]')
    function renderPicker() {
      pickerEl.innerHTML = ''
      probes.forEach((probe) => {
        const b = document.createElement('button')
        b.type = 'button'
        b.className = 'probe-chip' + (probe.visible ? ' active' : '')
        b.style.setProperty('--mc', probe.colorHex)
        b.innerHTML = '<span class="chip-dot"></span><span></span>'
        b.querySelector('span:last-child').textContent = pick(probe.label, probe.labelEn)
        b.addEventListener('click', () => {
          probe.visible = !probe.visible
          probe.group.visible = probe.visible
          probe.sat.visible = probe.visible
          probe.satLabel.style.display = probe.visible ? '' : 'none'
          probe.milestones.forEach((entry) => { entry.el.style.display = probe.visible ? '' : 'none' })
          b.classList.toggle('active', probe.visible)
        })
        pickerEl.appendChild(b)
      })
    }

    // --- Milestone list (panel) ---
    const mileListEl = document.querySelector('[data-mile-list]')
    const nowLineEl = document.querySelector('[data-now-line]')
    function renderMileList() {
      mileListEl.innerHTML = ''
      allMilestones.forEach(({ probe, entry }) => {
        const li = document.createElement('li')
        li.className = 'mile-item'
        li.innerHTML = '<span class="mile-dot" style="background:' + probe.colorHex + ';box-shadow:0 0 5px ' + probe.colorHex + '"></span><span></span>'
        const txt = li.querySelector('span:last-child')
        const label = pick(probe.label, probe.labelEn) + ' · ' + pick(entry.m.zh, entry.m.en)
        txt.innerHTML = '<b></b><span class="meta"></span>'
        txt.querySelector('b').textContent = label
        txt.querySelector('.meta').textContent = entry.m.date + ' · ' + entry.m.r_au + ' AU'
        li.addEventListener('click', () => { stopProbePlay(probe); applyProbeArc(probe, entry.arcFrac) })
        mileListEl.appendChild(li)
      })
      const dataEndDate = probesData[0].end
      const list = probes.map((probe) => pick(probe.label, probe.labelEn) + ' ' + probe.distAu + ' AU').join(' · ')
      nowLineEl.textContent = I18N.t('msg.now', { date: dataEndDate, list })
    }

    // Re-render language-dependent dynamic text on toggle.
    I18N.onChange(() => { renderPicker(); renderMileList(); updateAllLabelText(); buildDock() })

    function updateAllLabelText() {
      sunLabel.textContent = I18N.t('msg.sun')
      helioLabel.textContent = I18N.t('msg.helio')
      planetRings.forEach(({ planet, labelEl }) => { labelEl.textContent = I18N.t('msg.planet.' + planet.key) })
      probes.forEach((probe) => { probe.satLabel.textContent = pick(probe.label, probe.labelEn) })
      probes.forEach((probe) => probe.milestones.forEach((entry) => {
        entry.tipB.textContent = pick(entry.m.zh, entry.m.en)
        entry.tipMeta.textContent = entry.m.date + ' · ' + entry.m.r_au + ' AU'
      }))
    }

    // --- Collapsible panel (mobile-first collapse, matches the sibling pages) ---
    const panelEl = document.querySelector('.panel')
    const openBtn = document.querySelector('[data-panel-open]')
    const setPanelCollapsed = (collapsed) => {
      panelEl.classList.toggle('collapsed', collapsed)
      openBtn.setAttribute('aria-expanded', String(!collapsed))
    }
    document.querySelector('[data-panel-collapse]').addEventListener('click', () => setPanelCollapsed(true))
    openBtn.addEventListener('click', () => setPanelCollapsed(false))
    if (window.matchMedia('(max-width: 720px)').matches) setPanelCollapsed(true)

    // --- Projection + render loop ---
    const proj = new THREE.Vector3()
    function toScreen(v3, w, h) {
      proj.copy(v3).project(camera)
      if (proj.z > 1) return null
      return { x: (proj.x * 0.5 + 0.5) * w, y: (-proj.y * 0.5 + 0.5) * h }
    }
    function placeLabel(el, worldVec, w, h) {
      const p = toScreen(worldVec, w, h)
      if (p) { el.style.display = ''; el.style.left = p.x + 'px'; el.style.top = p.y + 'px' }
      else el.style.display = 'none'
    }

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight
      renderer.setSize(w, h, false)
      camera.aspect = w / h
      camera.updateProjectionMatrix()
    }
    window.addEventListener('resize', resize)

    const originVec = new THREE.Vector3(0, 0, 0)
    function draw(w, h) {
      placeLabel(sunLabel, originVec, w, h)
      planetRings.forEach(({ labelEl, dotVec }) => { placeLabel(labelEl, dotVec, w, h) })
      placeLabel(helioLabel, new THREE.Vector3(helioRadius * Math.cos(HELIO_LABEL_ANGLE), helioRadius * Math.sin(HELIO_LABEL_ANGLE), 0), w, h)
      probes.forEach((probe) => {
        if (probe.visible) placeLabel(probe.satLabel, probe.sat.position, w, h)
        probe.milestones.forEach((entry) => { if (probe.visible) placeLabel(entry.el, entry.posVec, w, h) })
      })
      renderer.render(scene, camera)
    }

    let lastTime = null
    function tick(now) {
      if (lastTime == null) lastTime = now
      const dt = Math.min(now - lastTime, 100) // clamp so a hidden-tab gap can't jump the timeline
      lastTime = now
      // Each probe advances independently, at its own arc-length pace, on its
      // own play flag — playing/scrubbing one never touches the other.
      probes.forEach((probe) => {
        if (!probe.playing) return
        const next = probe.s + dt / (probe.seconds * 1000)
        if (next >= 1) { applyProbeArc(probe, 1); stopProbePlay(probe) } else applyProbeArc(probe, next)
      })
      controls.update()
      const w = canvas.clientWidth, h = canvas.clientHeight
      draw(w, h)
      requestAnimationFrame(tick)
    }

    renderPicker()
    renderMileList()
    updateAllLabelText()
    buildDock()
    resize()
    requestAnimationFrame(tick)
  }
})()
</script>
</body>
</html>
