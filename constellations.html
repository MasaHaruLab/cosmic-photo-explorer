      },

      ],
      links: [ ['segin', 'ruchbah'], ['ruchbah', 'gamma'], ['gamma', 'schedar'], ['schedar', 'caph'] ],

  // All figures share the Big-Dipper-tuned constants (sprite sizes, orbit limits,
  // background, thresholds). To make that possible we uniformly scale each figure's
  // 3D positions so its centroid sits at the same working radius — this preserves
  // every star's DIRECTION from Earth and their relative depths (so the perspective
  // illusion stays faithful), while the side panel keeps showing the real distances.
  const WORK_RADIUS = 90

  const canvas = document.getElementById('sky')
  const labelLayer = document.getElementById('labels')
  const statusEl = document.querySelector('[data-status]')
  const I18N = window.I18N

  // Load the vendored engine (self-hosted, same as the solar page).
  const load = (src) => new Promise((res, rej) => {
    const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej
    document.head.appendChild(s)
  })
  load('vendor/three.min.js').then(() => load('vendor/OrbitControls.js')).then(start)

  // Equatorial (ra, dec, distance) -> Cartesian. From the origin (Earth) the
  // direction is exactly the star's sky position, so the view from (0,0,0)
  // reproduces the familiar pattern; depth only shows once you move off Earth.
  function toVec3(THREE, s) {
    const a = s.ra * Math.PI / 180, d = s.dec * Math.PI / 180
    return new THREE.Vector3(
      s.dist * Math.cos(d) * Math.cos(a),
      s.dist * Math.cos(d) * Math.sin(a),
      s.dist * Math.sin(d),
    )
  }

  function starSprite(THREE) {
    const c = document.createElement('canvas'); c.width = c.height = 64
    const g = c.getContext('2d')
    const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32)
    grd.addColorStop(0.0, 'rgba(255,255,255,1)')
    grd.addColorStop(0.22, 'rgba(245,249,255,0.95)')
    grd.addColorStop(0.5, 'rgba(160,200,255,0.35)')
    grd.addColorStop(1.0, 'rgba(160,200,255,0)')
    g.fillStyle = grd; g.fillRect(0, 0, 64, 64)
    return new THREE.CanvasTexture(c)
  }

  function start() {
    const THREE = window.THREE
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5))
    renderer.outputEncoding = THREE.sRGBEncoding
    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 6000)

    // Faint background starfield for depth (shared across figures).
    const bgGeo = new THREE.BufferGeometry()
    const bgN = 500, bgArr = new Float32Array(bgN * 3)
    let seed = 7
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280 }
    for (let i = 0; i < bgN; i++) {
      const th = rnd() * Math.PI * 2, ph = Math.acos(rnd() * 2 - 1), r = 2600
      bgArr[i * 3] = r * Math.sin(ph) * Math.cos(th)
      bgArr[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th)
      bgArr[i * 3 + 2] = r * Math.cos(ph)
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgArr, 3))
    scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x9fb0d0, size: 3, sizeAttenuation: false, transparent: true, opacity: 0.5 })))

    // Earth marker at the origin. Front-side material → invisible while the
    // camera sits at the origin (Earth's view), appears once you orbit away.
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(2.4, 24, 18),
      new THREE.MeshBasicMaterial({ color: 0x2f7fff }),
    )
    scene.add(earth)

    const tex = starSprite(THREE)

    // Controls: orbit around the (current) constellation centroid.
    const controls = new THREE.OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.08
    controls.rotateSpeed = 0.55
    controls.enablePan = false
    controls.minDistance = 28
    controls.maxDistance = 320

    // --- Per-figure state, rebuilt on every switch ---
    const conGroup = new THREE.Group()
    scene.add(conGroup)
    let activeCon = null
    let pos = {}                 // scaled positions by star id
    const centroid = new THREE.Vector3()
    let starLabels = []          // { s, el, nm, d }
    let sightlines = null
    let showSightlines = false

    const earthLabel = document.createElement('div'); earthLabel.className = 'earth-label'
    labelLayer.appendChild(earthLabel)

    function disposeFigure() {
      conGroup.children.slice().forEach((o) => {
        if (o.geometry) o.geometry.dispose()
        if (o.material) o.material.dispose()
      })
      conGroup.clear()
      starLabels.forEach(({ el }) => el.remove())
      starLabels = []
      sightlines = null
    }

    function buildFigure(con) {
      disposeFigure()
      activeCon = con

      // Raw positions + centroid, then a uniform scale to the shared working radius.
      const raw = {}
      centroid.set(0, 0, 0)
      con.stars.forEach((s) => { raw[s.id] = toVec3(THREE, s); centroid.add(raw[s.id]) })
      centroid.multiplyScalar(1 / con.stars.length)
      const k = WORK_RADIUS / (centroid.length() || 1)
      pos = {}
      con.stars.forEach((s) => { pos[s.id] = raw[s.id].clone().multiplyScalar(k) })
      centroid.multiplyScalar(k)

      // Stars (additive sprites, sized by brightness).
      con.stars.forEach((s) => {
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending })
        const sp = new THREE.Sprite(mat)
        const size = 2 + (3.4 - s.mag) * 1.0
        sp.scale.set(size, size, 1)
        sp.position.copy(pos[s.id])
        conGroup.add(sp)
      })

      // Constellation lines — always connected; only the camera moves.
      const linePts = []
      con.links.forEach(([a, b]) => { linePts.push(pos[a].x, pos[a].y, pos[a].z, pos[b].x, pos[b].y, pos[b].z) })
      const lineGeo = new THREE.BufferGeometry()
      lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(linePts), 3))
      conGroup.add(new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ color: 0x37e0ff, transparent: true, opacity: 0.8 })))

      // Sightlines from Earth (origin) to each star — toggleable depth cue.
      const sightPts = []
      con.stars.forEach((s) => { sightPts.push(0, 0, 0, pos[s.id].x, pos[s.id].y, pos[s.id].z) })
      const sightGeo = new THREE.BufferGeometry()
      sightGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sightPts), 3))
      sightlines = new THREE.LineSegments(sightGeo, new THREE.LineBasicMaterial({ color: 0x37e0ff, transparent: true, opacity: 0.22 }))
      sightlines.visible = showSightlines
      conGroup.add(sightlines)

      // Star labels (crisp HTML, projected each frame).
      starLabels = con.stars.map((s) => {
        const el = document.createElement('div'); el.className = 'star-label'
        el.innerHTML = '<b></b><span class="d"></span>'
        labelLayer.appendChild(el)
        return { s, el, nm: el.querySelector('b'), d: el.querySelector('.d') }
      })

      controls.target.copy(centroid)
      goEarthView()
      refreshLabelText()
      refreshList()
      lastEarthState = null
      updateStatus()
    }

    function goEarthView() {
      // Camera exactly at Earth → the stars project into the real figure. First
      // update with damping off flushes leftover orbit momentum (sphericalDelta) so
      // the snap-back is clean; then place the camera at the origin and update again
      // with the delta already zeroed.
      const damp = controls.enableDamping
      controls.enableDamping = false
      controls.update()
      camera.position.set(0, 0, 0)
      controls.target.copy(centroid)
      controls.update()
      controls.enableDamping = damp
    }

    function refreshLabelText() {
      const zh = I18N.getLang() === 'zh'
      const unit = I18N.t('con.unit')
      starLabels.forEach(({ s, nm, d }) => {
        nm.textContent = zh ? s.zh : s.west
        d.textContent = s.dist + ' ' + unit
      })
      earthLabel.textContent = I18N.t('con.earth')
    }

    // Side panel copy (title/lede/about/heading/source) for the active figure.
    const titleEl = document.querySelector('[data-con-title]')
    const ledeEl = document.querySelector('[data-con-lede]')
    const aboutEl = document.querySelector('[data-con-about]')
    const starsHEl = document.querySelector('[data-con-stars-h]')
    const sourceEl = document.querySelector('[data-con-source]')
    const listEl = document.getElementById('starlist')
    const pickerEl = document.querySelector('[data-con-picker]')

    function pick(o) { return I18N.getLang() === 'zh' ? o.zh : o.en }

    function renderCopy() {
      if (!activeCon) return
      const zh = I18N.getLang() === 'zh'
      titleEl.textContent = pick(activeCon.title)
      ledeEl.textContent = pick(activeCon.lede)
      aboutEl.innerHTML = activeCon.about.map((p) => '<p>' + pick(p) + '</p>').join('')
      const n = activeCon.stars.length
      starsHEl.textContent = zh ? (n + ' 颗星与它们的距离') : ('The ' + n + ' stars and their distances')
      sourceEl.textContent = pick(activeCon.source)
    }

    function refreshList() {
      if (!activeCon) return
      const zh = I18N.getLang() === 'zh'
      const unit = I18N.t('con.unit')
      listEl.innerHTML = ''
      activeCon.stars.forEach((s) => {
        const li = document.createElement('li')
        li.innerHTML = '<span class="nm">' + (zh ? s.zh : s.west) +
          '<span>' + (zh ? s.west : s.zh) + ' ' + s.bayer + '</span></span>' +
          '<span class="dist">' + s.dist + ' ' + unit + '</span>'
        listEl.appendChild(li)
      })
    }

    function renderPicker() {
      pickerEl.innerHTML = ''
      CONSTELLATIONS.forEach((con) => {
        const b = document.createElement('button')
        b.type = 'button'
        b.className = 'con-pick-btn' + (activeCon && con.id === activeCon.id ? ' active' : '')
        b.textContent = pick(con.name)
        b.addEventListener('click', () => {
          if (!activeCon || con.id !== activeCon.id) switchTo(con)
        })
        pickerEl.appendChild(b)
      })
    }

    function switchTo(con) {
      buildFigure(con)
      renderCopy()
      renderPicker()
    }

    // Live status: are we still (near) Earth's viewpoint?
    let lastEarthState = null
    function updateStatus() {
      const nearEarth = camera.position.length() < 14
      if (nearEarth !== lastEarthState) {
        lastEarthState = nearEarth
        statusEl.textContent = I18N.t(nearEarth ? 'con.status.earth' : 'con.status.off')
      }
    }

    // Re-localize everything dynamic when the language flips.
    I18N.onChange(() => { renderCopy(); renderPicker(); refreshLabelText(); refreshList(); lastEarthState = null; updateStatus() })

    // Buttons.
    document.querySelector('[data-reset]').addEventListener('click', goEarthView)
    const slBtn = document.querySelector('[data-sightlines]')
    slBtn.addEventListener('click', () => {
      showSightlines = !showSightlines
      if (sightlines) sightlines.visible = showSightlines
      slBtn.setAttribute('data-i18n', showSightlines ? 'con.sightlines.off' : 'con.sightlines.on')
      slBtn.textContent = I18N.t(showSightlines ? 'con.sightlines.off' : 'con.sightlines.on')
    })

    // Project a world point to screen pixels; returns null if behind the camera.
    const proj = new THREE.Vector3()
    function toScreen(v3, w, h) {
      proj.copy(v3).project(camera)
      if (proj.z > 1) return null
      return { x: (proj.x * 0.5 + 0.5) * w, y: (-proj.y * 0.5 + 0.5) * h }
    }

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight
      renderer.setSize(w, h, false)
      camera.aspect = w / h
      camera.updateProjectionMatrix()
    }
    window.addEventListener('resize', resize)

    function draw() {
      const w = canvas.clientWidth, h = canvas.clientHeight
      updateStatus()
      starLabels.forEach(({ el, s }) => {
        const p = toScreen(pos[s.id], w, h)
        if (p) { el.style.display = ''; el.style.left = p.x + 'px'; el.style.top = p.y + 'px' }
        else el.style.display = 'none'
      })
      // Earth label — hide when the camera is essentially on Earth (origin ≈ camera).
      const ep = camera.position.length() > 6 ? toScreen(earth.position, w, h) : null
      if (ep) { earthLabel.style.display = ''; earthLabel.style.left = ep.x + 'px'; earthLabel.style.top = ep.y + 'px' }
      else earthLabel.style.display = 'none'
      renderer.render(scene, camera)
    }

    // Continuous render loop. The scene is trivial (a few draw calls), so always
    // rendering is cheap — and unlike a dirty-flag gate it can never get stuck in a
    // state where drags/buttons stop repainting. The browser pauses rAF while the
    // tab is hidden, so an idle background tab costs nothing anyway.
    function tick() {
      controls.update()
      draw()
      requestAnimationFrame(tick)
    }

    // Boot on the Big Dipper.
    switchTo(CONSTELLATIONS[0])
    resize()
    tick()
  }
})()
</script>
</body>
</html>
